interface:
  display_name: "PiFlow Fail Fixer"
  short_description: "基于真实失败证据分析根因、落方案、修复并验证"
  default_prompt: "Use $piflow-fail-fixer to analyze a failed or stopped PiFlow project from real evidence, write a repair plan, apply a real fix when the root cause is clear, and report verification results before rerun."

